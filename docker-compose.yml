services:
  db:
    image: postgres:16-alpine
    container_name: kaikei-db
    environment:
      POSTGRES_USER: kaikei
      POSTGRES_PASSWORD: kaikei
      POSTGRES_DB: kaikei
    ports:
      - "5433:5432"
    volumes:
      - kaikei_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaikei -d kaikei"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kaikei_db_data:
