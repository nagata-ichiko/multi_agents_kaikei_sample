<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="30%" style="stop-color:#E0E7FF"/>
      <stop offset="50%" style="stop-color:#FFFFFF"/>
      <stop offset="70%" style="stop-color:#E0E7FF"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#000"/>

  <!-- Subtle grid -->
  <g stroke="#0A0A0A" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Ambient glow behind title -->
  <ellipse cx="640" cy="270" rx="400" ry="80" fill="#8B5CF6" opacity="0.04"/>
  <ellipse cx="640" cy="270" rx="250" ry="50" fill="#8B5CF6" opacity="0.06"/>

  <!-- Title shadow layer (glow effect) -->
  <text x="640" y="280" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="120" font-weight="900" fill="url(#grad)" letter-spacing="16" opacity="0.15" filter="url(#softGlow)">
    YAMASAKI
  </text>

  <!-- Title main -->
  <text x="640" y="280" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="120" font-weight="900" fill="url(#textGrad)" letter-spacing="16" filter="url(#glow)">
    YAMASAKI
  </text>

  <!-- Gradient underline -->
  <rect x="280" y="300" width="720" height="2" fill="url(#grad)" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="640" y="355" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="24" fill="#666">
    AI-Led Dev Framework for Claude Code
  </text>

  <!-- Tags (colored borders) -->
  <g transform="translate(640, 440)">
    <rect x="-330" y="-20" width="180" height="40" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
    <text x="-240" y="7" text-anchor="middle" font-family="'SF Mono', monospace" font-size="16" fill="#3B82F6" opacity="0.8">SPEC-FIRST</text>

    <rect x="-90" y="-20" width="180" height="40" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="7" text-anchor="middle" font-family="'SF Mono', monospace" font-size="16" fill="#8B5CF6" opacity="0.8">AGENT TEAMS</text>

    <rect x="150" y="-20" width="180" height="40" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.5"/>
    <text x="240" y="7" text-anchor="middle" font-family="'SF Mono', monospace" font-size="16" fill="#22C55E" opacity="0.8">SECURE</text>
  </g>

  <!-- Top gradient line -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#grad)" opacity="0.6"/>

  <!-- Bottom gradient line -->
  <rect x="0" y="638" width="1280" height="2" fill="url(#grad)" opacity="0.3"/>
</svg>
